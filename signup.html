<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GrantBridge | Sign Up</title>
    <meta name="description" content="Create your GrantBridge account." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-body">
    <div class="auth-shell">
      <div class="auth-card">
        <a class="brand auth-brand" href="index.html">GrantBridge</a>
        <h1>Create your account</h1>
        <p>Start exploring grants and manage your applications in one place.</p>

        <form class="auth-form">
          <label>
            Full name
            <input type="text" placeholder="Jane Doe" required />
          </label>

          <label>
            Email address
            <input type="email" placeholder="you@example.com" required />
          </label>

          <label>
            Password
            <input type="password" placeholder="Create a password" required />
          </label>

          <label>
            Confirm password
            <input type="password" placeholder="Confirm your password" required />
          </label>

          <button class="btn btn-primary auth-submit" type="submit">Create Account</button>
        </form>

        <p class="auth-switch">
          Already have an account?
          <a href="login.html">Log in</a>
        </p>
      </div>
    </div>
  </body>
</html>
